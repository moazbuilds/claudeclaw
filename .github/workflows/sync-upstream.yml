name: Sync Upstream

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run - check for new commits without merging'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  guard:
    name: Check trigger
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.check.outputs.result }}
    steps:
      - id: check
        run: |
          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "schedule" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            echo "result=true" >> "$GITHUB_OUTPUT"
            echo "Proceeding: triggered by $EVENT"
          else
            echo "result=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: sync only runs on schedule or manual dispatch (got: $EVENT)"
          fi

  sync:
    name: Check and merge upstream changes
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/moazbuilds/claudeclaw.git

      - name: Fetch upstream
        run: git fetch upstream master

      - name: Check for new commits
        id: check
        run: |
          NEW=$(git log HEAD..upstream/master --oneline | wc -l | tr -d ' ')
          echo "new_commits=$NEW" >> "$GITHUB_OUTPUT"
          if [ "$NEW" -gt 0 ]; then
            echo "Found $NEW new upstream commits:"
            git log HEAD..upstream/master --oneline
          else
            echo "Already up to date with upstream."
          fi

      - name: Skip if dry run or no new commits
        if: steps.check.outputs.new_commits == '0' || inputs.dry_run == true
        run: echo "Nothing to do (new_commits=${{ steps.check.outputs.new_commits }}, dry_run=${{ inputs.dry_run }})"

      - name: Create sync branch
        if: steps.check.outputs.new_commits != '0' && inputs.dry_run != true
        id: branch
        run: |
          BRANCH="sync/upstream-$(date +%Y-%m-%d)"
          git checkout -b "$BRANCH"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Attempt merge
        if: steps.check.outputs.new_commits != '0' && inputs.dry_run != true
        id: merge
        run: |
          if git merge upstream/master --no-edit 2>&1; then
            echo "status=clean" >> "$GITHUB_OUTPUT"
            echo "Merge succeeded with no conflicts."
          else
            echo "status=conflicts" >> "$GITHUB_OUTPUT"
            echo "Merge has conflicts - committing for manual review."
            git add -A
            git commit -m "sync: upstream merge with conflicts (manual resolution needed)"
          fi

      - name: Push sync branch
        if: steps.check.outputs.new_commits != '0' && inputs.dry_run != true
        run: git push origin "${{ steps.branch.outputs.name }}" --force

      - name: Open PR (clean merge)
        if: steps.check.outputs.new_commits != '0' && inputs.dry_run != true && steps.merge.outputs.status == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create \
            --repo TerrysPOV/ClaudeClaw-Plus \
            --title "chore: sync upstream (${{ steps.check.outputs.new_commits }} new commits)" \
            --body "Automated sync from moazbuilds/claudeclaw:master. Auto-merge was clean - ready to merge." \
            --head "${{ steps.branch.outputs.name }}" \
            --base main

      - name: Open PR (needs review)
        if: steps.check.outputs.new_commits != '0' && inputs.dry_run != true && steps.merge.outputs.status == 'conflicts'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr create \
            --repo TerrysPOV/ClaudeClaw-Plus \
            --title "chore: sync upstream - CONFLICTS need manual review" \
            --body "Automated sync from moazbuilds/claudeclaw:master has merge conflicts. Resolve before merging." \
            --head "${{ steps.branch.outputs.name }}" \
            --base main
